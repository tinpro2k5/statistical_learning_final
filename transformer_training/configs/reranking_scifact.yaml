# ============================================================
# Task config: Document Reranking on BEIR SciFact
# Run:
#   python train.py --config configs/reranking_scifact.yaml
# ============================================================

task: document_reranking

# ----- Model -----
model_name_or_path: scieditor/document-reranking-scibert
num_labels: 2
ignore_mismatched_sizes: true

# ----- Data  (paths relative to the repo root) -----
train_file:      ../data/reranking/train.jsonl
validation_file: ../data/reranking/validation.jsonl
test_file:       ../data/reranking/test.jsonl

# Optional: remap dataset field names to what the Dataset class expects.
# field_map:
#   query: my_query_column
#   label: relevant

# ----- Tokenization -----
max_length: 512
label_smoothing: 0.1
# ----- Training -----
num_epochs: 3
batch_size: 8
eval_batch_size: 16
learning_rate: 2.0e-5
warmup_ratio: 0.06
gradient_accumulation_steps: 1
max_grad_norm: 1.0
seed: 42

# ----- Output -----
output_dir: outputs/reranking_scifact

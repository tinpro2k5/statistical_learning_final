# ============================================================
# Task config: Document Reranking on BEIR SciFact
# Run:
#   python train.py --config configs/reranking_scifact.yaml
# ============================================================

task: "document_reranking"
model_name_or_path: "allenai/scibert_scivocab_uncased"
num_labels: 2
ignore_mismatched_sizes: true

# ----- Data  (paths relative to the repo root) -----
train_file:      ../data/scifact/train.jsonl
validation_file: ../data/scifact/validation.jsonl
test_file:       ../data/scifact/test.jsonl

output_dir: "outputs/reranking_scifact"
max_length: 512

# ----- Training Hyperparameters -----
seed: 42
batch_size: 16
eval_batch_size: 16
learning_rate: 2.0e-5
num_epochs: 3
warmup_ratio: 0.06
label_smoothing: 0.1
gradient_accumulation_steps: 1
max_grad_norm: 1.0

# ----- Logging & Evaluation -----
logging_steps: 50
eval_steps: 200
save_steps: 200

# Mapping cột
field_map:
  query: "query"
  title: "title"
  abstract: "abstract"
  label: "label"

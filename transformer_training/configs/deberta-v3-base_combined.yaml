task: "document_reranking"
model_name_or_path: "microsoft/deberta-v3-base"
num_labels: 2
ignore_mismatched_sizes: true

# ----- Data -----
train_file:      ../data/combined/train.jsonl
validation_file: ../data/combined/validation.jsonl
test_file:       ../data/combined/test.jsonl

output_dir: "outputs/deberta_combined"
max_length: 512

# ----- Training Hyperparameters -----
# DeBERTa-v3 cần lr thấp hơn SciBERT + epsilon lớn hơn để tránh NaN
# Combined dataset lớn (~2x) nên warmup có nhiều bước hơn → có thể dùng lr tương đối cao hơn SciFact-only
seed: 42
batch_size: 16
learning_rate: 1.5e-5
adam_epsilon: 1e-6
num_epochs: 3
warmup_ratio: 0.1
label_smoothing: 0.1

# ----- Logging & Evaluation -----
logging_steps: 100

field_map:
  query: "query"
  title: "title"
  abstract: "abstract"
  label: "label"
